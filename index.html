<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desktop5</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/desktop.css">
<link rel="stylesheet" href="css/windows.css">
</head>
<body>

<!-- Visible WebGL output. Receives all pointer events; raycaster maps them to meshes. -->
<canvas id="gl"></canvas>

<!--
  Hidden texture sources. Each <canvas layoutsubtree> rasterizes one subtree into
  its own HTMLTexture. The chrome canvas is inline; the four window canvases are
  filled from windows/*.html by main.js. The data-x / data-y attributes give each
  window's initial desktop-px position; width/height give its size.
-->
<div id="sources">

  <!-- Menubar — own canvas so animation repaints only ~90k px instead of 5M -->
  <canvas class="src" id="src-menubar" layoutsubtree width="3440" height="39">
    <div id="menubar-chrome">
      <div id="menubar">
        <div id="menu-left">
          <span class="apple">&#63743;</span>
          <span class="menu-item bold">Finder</span>
          <span class="menu-item">File</span>
          <span class="menu-item">Edit</span>
          <span class="menu-item">View</span>
          <span class="menu-item">Go</span>
          <span class="menu-item">Window</span>
          <span class="menu-item">Help</span>
        </div>
        <span class="spacer"></span>
        <div class="menu-right">
          <span class="menu-icon-item">
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
              <rect x="0.6" y="0.6" width="21" height="10.8" rx="2.4" stroke="currentColor" stroke-width="1.2"/>
              <rect x="22" y="3.5" width="2.5" height="5" rx="1.2" fill="currentColor"/>
              <rect x="2" y="2" width="15.5" height="8" rx="1.5" fill="currentColor"/>
            </svg>
            91%
          </span>
          <span class="menu-icon-item">
            <svg width="16" height="13" viewBox="0 0 16 13" fill="none">
              <circle cx="8" cy="11.5" r="1.4" fill="currentColor"/>
              <path d="M4.8 8.8 Q8 5.8 11.2 8.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M2 6.2 Q8 0.8 14 6.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M0 3.5 Q8 -2.5 16 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </span>
          <span>Fri 3:24 PM</span>
          <span class="menu-icon-item">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="9.5" y1="9.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
      </div>
    </div>
  </canvas>

  <!-- Desktop chrome: wallpaper + dock + trash (no menubar) -->
  <canvas class="src" id="src-chrome" layoutsubtree width="3440" height="1440">
    <div id="desktop-chrome">

      <!-- Zone highlight overlay — shown during shift-drag to indicate snap target -->
      <div id="snap-zone-overlay"></div>

      <div id="trash">
        <svg viewBox="0 0 46 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="14" width="36" height="34" rx="4" fill="url(#tg)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          <line x1="16" y1="20" x2="16" y2="42" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="23" y1="20" x2="23" y2="42" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="30" y1="20" x2="30" y2="42" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="3" y="9" width="40" height="6" rx="3" fill="url(#lg)" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
          <rect x="17" y="5" width="12" height="5" rx="2.5" fill="url(#lg)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
          <defs>
            <linearGradient id="tg" x1="5" y1="14" x2="41" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7080a8"/><stop offset="100%" stop-color="#404e70"/>
            </linearGradient>
            <linearGradient id="lg" x1="3" y1="9" x2="43" y2="15" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#8898c0"/><stop offset="100%" stop-color="#505e88"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="label">Trash</span>
      </div>

      <div id="dock">
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#5ac8fa,#007aff)">🔵</div></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#1e1e1e,#3d1f6e)">🟣</div></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#34aadc,#1273ae)">🌐</div></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#1db954,#148039)">🎵</div></div>
        <div class="dock-sep"></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#f5f5f7,#d1d1d6)">📝</div></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#ff9f0a,#c97300)">📬</div></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#1c1c1e,#2c2c2e)">⬛</div></div>
        <div class="dock-item"><div class="dock-icon" style="background:linear-gradient(145deg,#636366,#3a3a3c)">⚙️</div></div>
      </div>

    </div>
  </canvas>

  <!-- Window texture sources (back-to-front order; filled from windows/*.html) -->
  <canvas class="src" data-id="music"    data-x="980"  data-y="400" layoutsubtree width="680" height="480"></canvas>
  <canvas class="src" data-id="browser"  data-x="1980" data-y="36"  layoutsubtree width="640" height="914"></canvas>
  <canvas class="src" data-id="obsidian" data-x="1340" data-y="36"  layoutsubtree width="640" height="914"></canvas>
  <canvas class="src" data-id="finder"   data-x="880"  data-y="80"  layoutsubtree width="760" height="480"></canvas>
  <canvas class="src" data-id="wordprocessor" data-x="1600" data-y="280" layoutsubtree width="740" height="900"></canvas>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
